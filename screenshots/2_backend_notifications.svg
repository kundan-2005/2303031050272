<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700">
  <rect width="100%" height="100%" fill="#071022"/>
  <text x="60" y="80" font-family="Arial" font-size="32" fill="#e6eef8">Mock: Backend Notifications Endpoint (GET /notifications)</text>
  <rect x="60" y="110" width="1080" height="420" rx="8" fill="#041227" stroke="#16324a"/>
  <text x="80" y="160" font-family="monospace" font-size="16" fill="#bcd3e6">GET /notifications?limit=10&page=1</text>
  <text x="80" y="190" font-family="monospace" font-size="14" fill="#9fb6d0">200 OK</text>
  <text x="80" y="220" font-family="monospace" font-size="14" fill="#9fb6d0">[</text>
  <text x="100" y="250" font-family="monospace" font-size="14" fill="#9fb6d0">{{"id":1,"title":"Welcome","priority":"low"}},</text>
  <text x="100" y="280" font-family="monospace" font-size="14" fill="#9fb6d0">{{"id":2,"title":"Alert","priority":"high"}}</text>
  <text x="80" y="320" font-family="Arial" font-size="16" fill="#9fb6d0">Use this area to show API responses or terminal output for logs.</text>
</svg>